<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - FlashMaster</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .auth-container {
      max-width: 400px;
      margin: 100px auto;
      padding: 2rem;
    }
    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .auth-form input {
      padding: 1rem;
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      background: var(--glass);
      color: var(--text);
      font-size: 1rem;
    }
    .auth-form button {
      padding: 1rem;
      border: none;
      border-radius: 8px;
      background: var(--success);
      color: white;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }
    .auth-form button:hover {
      opacity: 0.9;
    }
    .auth-link {
      text-align: center;
      margin-top: 1rem;
    }
    .auth-link a {
      color: var(--primary);
      text-decoration: none;
    }
    .auth-link a:hover {
      text-decoration: underline;
    }
    .error-message {
      color: var(--danger);
      text-align: center;
      padding: 0.5rem;
      border-radius: 4px;
      background: rgba(239, 68, 68, 0.1);
    }
    .success-message {
      color: var(--success);
      text-align: center;
      padding: 0.5rem;
      border-radius: 4px;
      background: rgba(16, 185, 129, 0.1);
    }
  </style>
</head>
<body>
  <div class="glass auth-container">
    <h2 style="text-align: center; margin-bottom: 2rem;">🎯 FlashMaster Sign Up</h2>
    
    <form id="signup-form" class="auth-form">
      <input type="text" id="username" placeholder="Username" required>
      <input type="email" id="email" placeholder="Email" required>
      <input type="password" id="password" placeholder="Password" required minlength="6">
      <input type="password" id="confirm-password" placeholder="Confirm Password" required minlength="6">
      <button type="submit">Sign Up</button>
    </form>
    
    <div id="message" class="error-message hidden"></div>
    
    <div class="auth-link">
      <p>Already have an account? <a href="login.html">Login</a></p>
    </div>
  </div>

  <script>
    // Check if already logged in
    if (localStorage.getItem('currentUser')) {
      window.location.href = 'index.html';
    }

    document.getElementById('signup-form').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const username = document.getElementById('username').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirm-password').value;
      const messageDiv = document.getElementById('message');
      
      // Validate passwords match
      if (password !== confirmPassword) {
        messageDiv.textContent = 'Passwords do not match';
        messageDiv.className = 'error-message';
        return;
      }
      
      // Get existing users
      const users = JSON.parse(localStorage.getItem('users')) || [];
      
      // Check if username already exists
      if (users.find(u => u.username === username)) {
        messageDiv.textContent = 'Username already exists';
        messageDiv.className = 'error-message';
        return;
      }
      
      // Check if email already exists
      if (users.find(u => u.email === email)) {
        messageDiv.textContent = 'Email already registered';
        messageDiv.className = 'error-message';
        return;
      }
      
      // Create new user
      const newUser = {
        username: username,
        email: email,
        password: password,
        createdAt: new Date().toISOString()
      };
      
      // Add user to users array
      users.push(newUser);
      localStorage.setItem('users', JSON.stringify(users));
      
      // Show success message
      messageDiv.textContent = 'Account created successfully! Redirecting to login...';
      messageDiv.className = 'success-message';
      
      // Redirect to login after 2 seconds
      setTimeout(() => {
        window.location.href = 'login.html';
      }, 2000);
    });
  </script>
</body>
</html>
